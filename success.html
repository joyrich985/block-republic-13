<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande confirmée — BR13</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060606;color:#f0ede6;font-family:'Barlow Condensed',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.wrap{max-width:520px;}
.icon{font-size:3.5rem;margin-bottom:1.5rem;}
h1{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:0.9;margin-bottom:1rem;}
h1 em{color:#c8102e;font-style:normal;display:block;}
p{font-size:1.1rem;color:#666;line-height:1.75;margin-bottom:0.75rem;}
.code{font-family:'Space Mono',monospace;font-size:0.9rem;background:#0e0e0e;border:1px solid #ffffff12;padding:0.75rem 1.5rem;color:#c9a84c;letter-spacing:0.1em;display:inline-block;margin:1.5rem 0;}
.btn{display:inline-block;margin-top:1.5rem;background:#c8102e;color:#f0ede6;border:none;padding:1rem 2.5rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">✓</div>
  <h1>COMMANDE<em>CONFIRMÉE</em></h1>
  <p>Ton paiement a bien été reçu par la République.<br>Un email de confirmation t'a été envoyé.</p>
  <p style="color:#444;">La livraison est traitée sous 3–5 jours ouvrés.<br>Members only — District XIII.</p>
  <div class="code" id="ref-code">BR13 — CHARGEMENT...</div>
  <br>
  <a href="/" class="btn">Retour au District</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');
if(sessionId){
  document.getElementById('ref-code').textContent = 'REF: ' + sessionId.slice(-12).toUpperCase();
}
</script>
</body>
</html>
